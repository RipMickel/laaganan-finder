<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <title>Laaganan</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --blue: #007AFF;
      --blue-dark: #0056b3;
      --red: #FF3B30;
      --green: #34C759;
      --orange: #FF9500;
      --purple: #AF52DE;
      --bg: #F2F2F7;
      --card: #FFFFFF;
      --text: #1C1C1E;
      --text2: #6C6C70;
      --sep: #E5E5EA;
      --radius: 14px;
      --sheet-radius: 20px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0; padding: 0;
      font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
      height: 100%; overflow: hidden;
      background: var(--bg);
    }

    /* ── MAP fills full screen ── */
    #map {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* ── LOADING BAR ── */
    #loading-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(0,122,255,0.15);
      z-index: 9999;
      display: none;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--blue), #5AC8FA);
      transition: width 0.4s ease;
      border-radius: 0 2px 2px 0;
    }

    /* ── TOP BAR ── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: calc(var(--safe-top) + 10px) 12px 10px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* Search pill */
    #search-wrap {
      flex: 1;
      position: relative;
    }
    #search-input {
      width: 100%;
      height: 44px;
      padding: 0 44px 0 16px;
      border-radius: 22px;
      border: none;
      background: var(--card);
      font-size: 16px;
      color: var(--text);
      outline: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      -webkit-appearance: none;
    }
    #search-input::placeholder { color: #AEAEB2; }
    #search-clear {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      width: 20px; height: 20px;
      background: #AEAEB2;
      border-radius: 50%;
      border: none;
      color: white;
      font-size: 12px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* Top icon buttons */
    .top-icon-btn {
      width: 44px; height: 44px;
      border-radius: 22px;
      border: none;
      background: var(--card);
      color: var(--blue);
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.1s;
    }
    .top-icon-btn:active { transform: scale(0.93); }
    .top-icon-btn.danger { color: var(--red); }

    /* Search suggestions */
    #search-suggestions {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      overflow: hidden;
      display: none;
      z-index: 1010;
      max-height: 240px;
      overflow-y: auto;
    }
    .suggestion-item {
      padding: 13px 16px;
      font-size: 15px;
      color: var(--text);
      border-bottom: 1px solid var(--sep);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:active { background: var(--bg); }
    .suggestion-icon { color: var(--text2); font-size: 16px; }

    /* ── CATEGORY PILLS (horizontal scroll) ── */
    #category-bar {
      position: fixed;
      left: 0; right: 0;
      z-index: 999;
      /* will be positioned below topbar dynamically */
      padding: 8px 0 8px 12px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #category-bar::-webkit-scrollbar { display: none; }
    #category-bar::after {
      content: '';
      flex-shrink: 0;
      width: 12px;
    }

    .cat-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 20px;
      border: none;
      background: var(--card);
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.1s, background 0.15s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .cat-pill:active { transform: scale(0.95); }
    .cat-pill.active {
      background: var(--blue);
      color: white;
      box-shadow: 0 3px 12px rgba(0,122,255,0.35);
    }
    .cat-pill .pill-badge {
      background: rgba(0,0,0,0.12);
      color: inherit;
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 11px;
      font-weight: 700;
    }
    .cat-pill.active .pill-badge {
      background: rgba(255,255,255,0.3);
    }

    /* ── BOTTOM SHEET ── */
    #bottom-sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 1000;
      background: var(--card);
      border-radius: var(--sheet-radius) var(--sheet-radius) 0 0;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
      transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
      padding-bottom: var(--safe-bottom);
    }
    #bottom-sheet.collapsed { transform: translateY(calc(100% - 70px)); }

    /* Drag handle */
    .sheet-handle {
      width: 36px; height: 4px;
      background: #D1D1D6;
      border-radius: 2px;
      margin: 10px auto 6px;
    }

    /* Sheet header */
    #sheet-header {
      padding: 0 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }
    #sheet-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
    }
    #sheet-subtitle {
      font-size: 13px;
      color: var(--text2);
      margin-top: 2px;
    }
    #sheet-chevron {
      font-size: 20px;
      color: #AEAEB2;
      transition: transform 0.3s;
    }
    #bottom-sheet.collapsed #sheet-chevron { transform: rotate(180deg); }

    /* Sheet content */
    #sheet-content {
      padding: 0 16px 8px;
      max-height: 45vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Result toast */
    #result-toast {
      margin: 0 0 10px;
      padding: 10px 14px;
      background: var(--bg);
      border-radius: var(--radius);
      font-size: 14px;
      color: var(--text);
      line-height: 1.4;
    }

    /* Action buttons row */
    #action-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .action-btn {
      flex: 1;
      height: 44px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .action-btn:active { transform: scale(0.97); opacity: 0.85; }
    .action-btn.primary { background: var(--blue); color: white; }
    .action-btn.secondary { background: var(--green); color: white; }
    .action-btn.danger { background: var(--red); color: white; display: none; }

    /* ── FLOATING BUTTONS (right side) ── */
    #fab-group {
      position: fixed;
      right: 16px;
      z-index: 998;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .fab {
      width: 48px; height: 48px;
      border-radius: 24px;
      border: none;
      background: var(--card);
      color: var(--blue);
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 14px rgba(0,0,0,0.15);
      cursor: pointer;
      transition: transform 0.1s;
    }
    .fab:active { transform: scale(0.92); }
    .fab.active { background: var(--orange); color: white; }

    /* Leaflet popup mobile-friendly */
    .leaflet-popup-content-wrapper {
      border-radius: 14px !important;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15) !important;
    }
    .leaflet-popup-content {
      font-size: 14px !important;
      line-height: 1.6 !important;
      margin: 12px 14px !important;
    }
    .leaflet-routing-container {
      max-height: 35vh;
      overflow-y: auto;
      font-size: 13px;
      border-radius: var(--radius);
    }

    /* Tap states for iOS feel */
    @media (hover: none) {
      .cat-pill:hover { background: var(--card); color: var(--text); }
      .cat-pill.active:hover { background: var(--blue); color: white; }
    }
  </style>
</head>
<body>

<!-- Loading bar -->
<div id="loading-bar"><div class="bar-fill"></div></div>

<!-- Map -->
<div id="map"></div>

<!-- TOP BAR -->
<div id="topbar">
  <div id="search-wrap">
    <input id="search-input" type="search" placeholder="🔎  Search places…"
      autocomplete="off" autocorrect="off" spellcheck="false"
      oninput="onSearchInput()" onkeydown="if(event.key==='Enter'){searchPlace();this.blur()}" />
    <button id="search-clear" onclick="clearSearch()">✕</button>
    <div id="search-suggestions"></div>
  </div>
  <button class="top-icon-btn" onclick="goToMyLocation()" title="My Location">📍</button>
</div>

<!-- CATEGORY PILLS -->
<div id="category-bar">
  <button class="cat-pill" id="pbtn-restaurant" onclick="findPlaces('restaurant')">🍽️ Restaurants</button>
  <button class="cat-pill" id="pbtn-pizza"      onclick="findPlaces('pizza')">🍕 Pizza</button>
  <button class="cat-pill" id="pbtn-local"      onclick="findPlaces('local')">🥘 Local Food</button>
  <button class="cat-pill" id="pbtn-fastfood"   onclick="findPlaces('fastfood')">🍔 Fast Food</button>
  <button class="cat-pill" id="pbtn-coffee"     onclick="findPlaces('coffee')">☕ Coffee</button>
  <button class="cat-pill" id="pbtn-pool"       onclick="findPlaces('pool')">🏊 Pools</button>
  <button class="cat-pill" id="pbtn-resort"     onclick="findPlaces('resort')">🌴 Resorts</button>
  <button class="cat-pill" id="pbtn-beach"      onclick="findPlaces('beach')">🏖️ Beaches</button>
  <button class="cat-pill" id="pbtn-park"       onclick="findPlaces('park')">🌳 Parks</button>
  <button class="cat-pill" id="pbtn-attraction" onclick="findPlaces('attraction')">🎡 Attractions</button>
</div>

<!-- FLOATING ACTION BUTTONS -->
<div id="fab-group">
  <button class="fab" id="fab-directions" onclick="toggleRouteMode()" title="Get Directions">🗺️</button>
  <button class="fab danger" id="fab-clear-route" onclick="resetRoute()" style="display:none;background:var(--red);color:white;" title="Clear Route">✕</button>
</div>

<!-- BOTTOM SHEET -->
<div id="bottom-sheet" class="collapsed">
  <div class="sheet-handle"></div>
  <div id="sheet-header" onclick="toggleSheet()">
    <div>
      <div id="sheet-title">Explore Nearby</div>
      <div id="sheet-subtitle">Tap a category above to discover places</div>
    </div>
    <span id="sheet-chevron">⌃</span>
  </div>
  <div id="sheet-content">
    <div id="result-toast">Loading your location…</div>
    <div id="action-row">
      <button class="action-btn primary" id="btn-directions" onclick="toggleRouteMode()">🗺️ Directions</button>
      <button class="action-btn danger" id="btn-clear-places" onclick="clearPlaces()">✕ Clear</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="script.js"></script>

<script>
  // Position category bar below topbar dynamically
  function positionCategoryBar() {
    const tb = document.getElementById('topbar');
    const cb = document.getElementById('category-bar');
    cb.style.top = tb.offsetHeight + 'px';
    // Position FABs above bottom sheet
    const sheet = document.getElementById('bottom-sheet');
    const fab = document.getElementById('fab-group');
    fab.style.bottom = (72 + parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--safe-bottom') || 0)) + 'px';
  }

  let sheetExpanded = false;
  function toggleSheet() {
    sheetExpanded = !sheetExpanded;
    document.getElementById('bottom-sheet').classList.toggle('collapsed', !sheetExpanded);
  }
  function expandSheet() {
    sheetExpanded = true;
    document.getElementById('bottom-sheet').classList.remove('collapsed');
  }
  function collapseSheet() {
    sheetExpanded = false;
    document.getElementById('bottom-sheet').classList.add('collapsed');
  }

  function clearSearch() {
    document.getElementById('search-input').value = '';
    document.getElementById('search-clear').style.display = 'none';
    hideSuggestions();
  }

  document.getElementById('search-input').addEventListener('input', function() {
    document.getElementById('search-clear').style.display = this.value ? 'flex' : 'none';
  });

  window.addEventListener('resize', positionCategoryBar);
  window.addEventListener('load', positionCategoryBar);
  setTimeout(positionCategoryBar, 100);

  // Touch drag for bottom sheet
  let startY = 0, startExpanded = false;
  const sheet = document.getElementById('bottom-sheet');
  sheet.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
    startExpanded = sheetExpanded;
  }, { passive: true });
  sheet.addEventListener('touchend', e => {
    const dy = e.changedTouches[0].clientY - startY;
    if (dy < -40) expandSheet();
    else if (dy > 40) collapseSheet();
  }, { passive: true });
</script>
</body>
</html>
